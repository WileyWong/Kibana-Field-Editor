# Kibana 7.5.2 + ES 7.5.2   (Ace Editor — 插件支持 ✅)
#
# 启动: docker compose -f docker-compose-kibana7.5.yaml up -d
# 停止: docker compose -f docker-compose-kibana7.5.yaml down -v
#
# Kibana: http://localhost:5601/app/kibana#/dev_tools/console
# ES:     http://localhost:9200
#
# 验证编辑器类型: 打开 Dev Tools → F12 Elements → 搜索 .conApp__output

version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.5.2
    container_name: es-7.5
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es75-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 10s
      timeout: 5s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:7.5.2
    container_name: kibana-7.5
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  es75-data:
