# Kibana 8.17.3 + ES 8.17.3   (Monaco Editor — 插件不支持 ❌)
#
# 启动: docker compose -f docker-compose-kibana8.yaml up -d
# 停止: docker compose -f docker-compose-kibana8.yaml down -v
#
# Kibana: http://localhost:5601/app/dev_tools#/console
# ES:     http://localhost:9200
#
# 验证编辑器类型: 打开 Dev Tools → F12 Elements → 只有 .monaco-editor

version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.3
    container_name: es-8.17
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es8-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 10s
      timeout: 5s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.3
    container_name: kibana-8.17
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  es8-data:
