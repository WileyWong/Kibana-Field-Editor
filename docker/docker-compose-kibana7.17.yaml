# Kibana 7.17.28 + ES 7.17.28   (Monaco Editor — 插件不支持 ❌)
#
# 启动: docker compose -f docker-compose-kibana7.17.yaml up -d
# 停止: docker compose -f docker-compose-kibana7.17.yaml down -v
#
# Kibana: http://localhost:5601/app/dev_tools#/console
#   —— 注意 7.11+ URL 变了，不再是 /app/kibana#/...，而是 /app/dev_tools#/...
# ES:     http://localhost:9200
#
# 验证编辑器类型: 打开 Dev Tools → F12 Elements → 搜不到 .conApp__output，
#                 而是 .monaco-editor

version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.28
    container_name: es-7.17
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es717-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 10s
      timeout: 5s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.28
    container_name: kibana-7.17
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  es717-data:
